site_name: NAVER Careers
site_url: https://benelog.github.io/careers/
repo_url: https://github.com/benelog/careers
repo_name: benelog/careers
docs_dir: docs
site_description: NAVER Tech Careers — job descriptions for engineering, AI/ML, and product roles.

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang:
        - en
        - ko
  - redirects:
      redirect_maps:
        # Root → KR landing, matching the original GitBook behavior
        # (https://naver-career.gitbook.io/ → /kr/).
        'index.md': 'kr/index.md'

